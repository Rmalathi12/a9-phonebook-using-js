<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Book</title>
    <!-- external style sheet -CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- Bootstrap External css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet" 
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous"
    > 
</head>
<body>
    <!-- Header section -->
    <header>
        <h1>📞 Phone Book</h1>
    </header>
     <!--main content on the page  -->
    <main>
        <!-- search section -->
        <section>
        <form id="contactForm">
        <!-- input search bar -->
        <input type="text" id="searchInput" placeholder="Search contacts by name...">
        <button type="button" class="search">search</button>
        </section>
        <!-- input section -->
        <section>
        <!-- input phoneNumber -->
         <label for="Number">PhoneNumber :</label>
        <input type="tel" id="phoneNumber" placeholder="Enter your phonenumber" required><br>
        <!-- input contactName -->
         <label for="Name">Name  :</label>
        <input type="text" id="contactName" placeholder="Enter your name" required><br>
        <!-- input search bar -->
         <label for="Email" >Email  :</label>
        <input type="email" id="emailId" placeholder="Enter your email" required>
        <div class="ctaBtn">
        <!-- CTA button -->
        <!-- save button -->
        <button type="submit" id="saveBtn">save</button>
        <!-- cancel button -->
        <button type="reset" id="cancelBtn">cancel</button>
        </div>
        </form>        
        </section> 
    </main>

    <!-- External javascript in js -->
     <script src="./script.js"></script>
    
</body>
</html>
